{% extends "base.html" %}
{% block title %}Add Expense — Expense Sharing{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Add Expense</h1>
        <p class="subtitle">Record a new shared expense</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('add_expense') }}">
        <div class="form-group">
            <label for="title">Description</label>
            <input type="text" id="title" name="title" placeholder="e.g. Dinner, Groceries, Rent" required maxlength="150">
        </div>

        <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0.01" required>
        </div>

        <div class="form-group">
            <label for="paid_by">Paid By</label>
            <input type="text" id="paid_by" name="paid_by" placeholder="Who paid for this?" required maxlength="100">
        </div>

        <div class="form-group">
            <label for="participants">Participants</label>
            <input type="text" id="participants" name="participants"
                   placeholder="Alice, Bob, Charlie" required maxlength="500">
            <span class="hint">Comma-separated names of everyone splitting this expense</span>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Expense</button>
        </div>
    </form>
</div>
{% endblock %}
